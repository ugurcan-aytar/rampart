run:
  timeout: 5m
  go: "1.23"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - misspell

issues:
  exclude-rules:
    # Tests deliberately construct malformed payloads and use
    # unseeded randomness where helpful. gosec rules fire noisy
    # positives here that obscure the real production-code hits.
    - path: _test\.go
      linters:
        - gosec

    # `domain.DomainEvent` reads intentionally — it's the
    # package-spanning interface every event type satisfies, and
    # a rename ("Event" would be too generic, collides with
    # `events.Bus.Publish(Event)` callers in every consumer) would
    # cascade into the api + SSE + bus packages for no behaviour
    # change. Caller-side name is short anyway: `events.Publish(x)`
    # is what appears in the code, not `domain.DomainEvent`. Revive's
    # stutter rule is correct-in-general but wrong here.
    - path: internal/domain/events\.go
      linters:
        - revive
      text: "stutters"
