app:
  title: rampart
  baseUrl: http://localhost:3000

organization:
  name: rampart demo

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # In-memory dev database keeps the stack single-process; Phase 2 lands
  # postgres when the engine gains a real storage backend.
  database:
    client: better-sqlite3
    connection: ':memory:'

auth:
  environment: development
  # Guest auth is sufficient for the demo. Production deployments swap
  # in a real provider (OIDC, GitHub, etc.) — see the AutoSignInPage
  # component in packages/app/src/ for the dev harness bypass.
  providers:
    guest: {}

# rampart-backend proxy + catalog-sync config. Frontend no longer
# reads `rampart.baseUrl`; it resolves the proxy path via
# discoveryApiRef (`${backend.baseUrl}/api/rampart`), so there is
# nothing under `rampart:` that ships to the browser.
rampart:
  engine:
    baseUrl: ${RAMPART_ENGINE_URL:-http://localhost:8080}
    # authToken is only required when RAMPART_AUTH_ENABLED=true on the
    # engine side. Issue one via `POST /v1/auth/token` or out-of-band
    # against a cluster-internal IdP and expose as env.
    authToken: ${RAMPART_ENGINE_AUTH_TOKEN}
  catalogSyncInterval: 30m

catalog:
  rules:
    - allow: [Component, API, System, Domain, Group, User, Resource]
  locations: []
