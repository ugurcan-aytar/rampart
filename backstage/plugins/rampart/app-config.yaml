# Minimal app-config for `yarn dev` — backstage-cli package start picks
# this up by default when run from the plugin's workspace directory.
#
# Why this file exists: createDevApp()'s SignInPage reads
# configApi.getString('app.title') while rendering its header. Without a
# configured app.title the mock-config ConfigReader throws, and the
# dev-utils shell renders a React error boundary instead of the plugin.
# Not a hack — upstream Backstage monorepo plugins ship the same file
# under plugins/<id>/app-config.yaml for the same reason.

app:
  title: rampart plugin — dev harness
  baseUrl: http://localhost:3000

backend:
  baseUrl: http://localhost:7007

# Frontend reaches the engine through `${backend.baseUrl}/api/rampart`,
# resolved via discoveryApiRef — no `rampart.baseUrl` on the frontend.
# The rampart-backend plugin (not loaded in this dev harness) is where
# `rampart.engine.baseUrl` lives; see examples/app/app-config.yaml.
