spec:
  inputs:
    lockfile:
      description: Path to the npm package-lock.json to scan.
      default: package-lock.json
    component_ref:
      description: Backstage-style Component reference.
      default: ""
    fail_on:
      description: Severity threshold (low | medium | high | critical). Phase 2.
      default: high
---
rampart-scan:
  stage: test
  image: golang:1.23-alpine
  variables:
    LOCKFILE: $[[ inputs.lockfile ]]
    COMPONENT_REF: $[[ inputs.component_ref ]]
  before_script:
    - apk add --no-cache git
  script:
    - go install github.com/ugurcan-aytar/rampart/cli/cmd/rampart@latest
    - |
      set -euo pipefail
      args=(scan --format sarif)
      [ -n "$COMPONENT_REF" ] && args+=(--component-ref "$COMPONENT_REF")
      [ -n "${CI_COMMIT_SHA:-}" ] && args+=(--commit-sha "$CI_COMMIT_SHA")
      rampart "${args[@]}" "$LOCKFILE" > rampart.sarif
  artifacts:
    paths:
      - rampart.sarif
    reports:
      sast: rampart.sarif
    expire_in: 30 days
