# Supply chain hardening — relaxing any of these requires an ADR.
enableScripts: false                 # No postinstall / preinstall / prepare scripts.
nodeLinker: node-modules             # Classic node_modules layout (Backstage compat).
defaultSemverRangePrefix: ""         # Exact versions — no caret / tilde drift.

# Note: A "minimum-release-age" quarantine (pnpm has it natively) is NOT supported
# by Yarn 4.6 out of the box. The defense is enforced instead at PR-review time via
# Renovate's `minimumReleaseAge` setting, wired up in Adım 8. Tracked in SECURITY.md.
