name: engine

# Go engine (engine/) — unit + integration tests, lint, vulnerability
# scan, and per-package coverage gates. Does not build images; the
# release workflow owns artifact publication.
#
# Triggers on any engine/ or schemas/ change on main or PR.

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'schemas/openapi.yaml'
      - '.github/workflows/engine.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'schemas/openapi.yaml'
      - '.github/workflows/engine.yml'
  workflow_dispatch:

# Cancel superseded runs on the same branch — one PR push shouldn't
# leave N stale workflows draining minutes.
concurrency:
  group: engine-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24']
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: engine/go.sum

      - name: go mod download
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Unit + integration tests with coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage gates
        # Per-package thresholds enforce the load-bearing packages stay
        # honest even when total coverage dips (tests concentrate in
        # the core business logic, so the total number is dominated by
        # incidental packages like gen/).
        run: |
          go tool cover -func=coverage.out > coverage.txt
          cat coverage.txt

          total=$(grep -E '^total:' coverage.txt | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"

          # A helper to look up a package's coverage and fail below the
          # given threshold. Matches on the exact package path shown
          # by `go tool cover -func` (last column is %).
          require_cov() {
            local pkg="$1" min="$2"
            local have
            have=$(awk -v p="${pkg}/" '$1 ~ p {sum += $NF; n++} END {if (n) printf "%.1f", sum/n; else print "0.0"}' coverage.txt | tr -d '%')
            echo "  ${pkg}: ${have}% (min ${min}%)"
            awk -v a="${have}" -v b="${min}" 'BEGIN {exit (a+0 >= b+0) ? 0 : 1}' \
              || { echo "FAIL: ${pkg} below ${min}%"; exit 1; }
          }
          require_cov github.com/ugurcan-aytar/rampart/engine/internal/domain 80
          require_cov github.com/ugurcan-aytar/rampart/engine/internal/api 70
          require_cov github.com/ugurcan-aytar/rampart/engine/internal/trust 85
          require_cov github.com/ugurcan-aytar/rampart/engine/internal/matcher 80
          # Total floor is deliberately low. Two structural reasons:
          #   1. engine/api/gen/* (~1000 lines, 0%) is OpenAPI
          #      generated code with no tests by design — shape is
          #      enforced by the handler tests against live routes.
          #   2. engine/internal/storage/storagetest (~200 lines, 0%)
          #      ships shared contract helpers called from
          #      DOWNSTREAM backends' *_test.go; the helper package
          #      itself has no tests, so go tool cover reports 0%
          #      even though the code runs.
          # The per-package gates above are the real guard.
          awk -v t="${total}" 'BEGIN {exit (t+0 >= 45) ? 0 : 1}' \
            || { echo "FAIL: total coverage ${total}% below 45%"; exit 1; }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: engine-coverage-${{ matrix.go }}
          path: engine/coverage.out
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
          cache-dependency-path: engine/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          # v1.62 is built against go 1.23 and fails `typecheck` on
          # packages that declare `go 1.24` in their go.mod (which
          # we now do). v1.64.x added 1.24 support. Staying on the
          # v1 line — v2.x has a breaking config-file format.
          version: v1.64.6
          working-directory: engine
          args: --timeout=5m

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: engine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
          cache-dependency-path: engine/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (advisory)
        # continue-on-error on purpose. govulncheck's job is to
        # SURFACE CVEs, not auto-fail the build — Go stdlib CVEs
        # land monthly and 90%+ target packages rampart's hot path
        # doesn't execute (TLS handshake, PEM parsing, URL quirk
        # in net/url). Blocking every PR on "a stdlib patch version
        # dropped 3 days ago" turns the gate into noise. The Actions
        # summary still shows the findings; security review reads
        # the output and decides if a Go minor bump is warranted.
        continue-on-error: true
        run: govulncheck ./...
