name: parity

# Byte-identical parity between Go parsers (engine/sbom/{npm,gomod,cargo})
# and the Rust sidecar (native/). Runs the full fixture matrix on every
# PR that touches either side, so a drift regression on either parser
# surfaces at review time, not at Adım 9 integration.
#
# Separate workflow because it needs BOTH toolchains + a release
# rampart-native build; keeping it out of engine.yml and native.yml
# means a one-side PR doesn't pay the ~3 min cross-toolchain cost.

on:
  push:
    branches: [main]
    paths:
      - 'engine/sbom/**'
      - 'engine/internal/ingestion/**'
      - 'engine/internal/domain/sbom.go'
      - 'engine/internal/domain/packageversion.go'
      - 'native/**'
      - 'schemas/native-ipc.md'
      - '.github/workflows/parity.yml'
  pull_request:
    paths:
      - 'engine/sbom/**'
      - 'engine/internal/ingestion/**'
      - 'engine/internal/domain/sbom.go'
      - 'engine/internal/domain/packageversion.go'
      - 'native/**'
      - 'schemas/native-ipc.md'
      - '.github/workflows/parity.yml'
  workflow_dispatch:

concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parity:
    name: TestParserParity
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache-dependency-path: engine/go.sum

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache cargo + target/
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-parity-cargo-${{ hashFiles('native/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-parity-cargo-

      - name: Prebuild rampart-native (release)
        # Parity test's `ensureNativeBinary` would otherwise pay this
        # in the middle of a Go test — slower and noisier. Build
        # once, spawn the binary from the test.
        working-directory: native
        run: cargo build --release --bin rampart-native --quiet

      - name: Parity test
        working-directory: engine
        run: |
          # Parity tests + error tests across all ecosystem parsers,
          # verbose for CI log archaeology.
          go test -run 'TestParserParity(_Errors)?$' -v ./sbom/...

      - name: Upload rampart-native binary on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rampart-native-debug
          path: native/target/release/rampart-native
          retention-days: 3
