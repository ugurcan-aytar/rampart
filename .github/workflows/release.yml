name: release

# Tag-triggered release pipeline. Orchestrates:
#   1. Go binaries via goreleaser (.goreleaser.yaml)
#   2. Rust sidecar via cargo cross-compile (4 targets)
#   3. Multi-arch container images (engine, native, backstage)
#      pushed to ghcr.io/ugurcan-aytar
#   4. Cosign keyless signing (OIDC) + SBOM attestation for every
#      artifact that leaves the repo
#
# Keyless signing uses GitHub OIDC — no cosign private key secret
# lives in the repo. Backstage plugins npm publish is deferred to
# v0.1.1 (trusted publishing configuration on npmjs.com pending).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v0.1.0)
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # create release, upload assets
  id-token: write       # OIDC for cosign keyless signing
  packages: write       # ghcr.io push
  attestations: write   # cosign attest
  issues: read

jobs:
  # -------------------------------------------------------------
  # 1. Go binaries via goreleaser
  # -------------------------------------------------------------
  goreleaser:
    name: goreleaser (go binaries)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Override release notes from CHANGELOG.md
        # goreleaser's auto-generated changelog includes commits that
        # the regex filters miss (e.g. `chore(deps):` slips past
        # `^chore:`). Override the body with the human-curated
        # CHANGELOG.md entry when one exists for the tag; otherwise
        # leave goreleaser's output as the fail-safe.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NO_V="${VERSION#v}"
          echo "Looking for CHANGELOG.md entry '## [$VERSION_NO_V]'"
          awk -v ver="$VERSION_NO_V" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; print; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/release-body.md
          if [ -s /tmp/release-body.md ]; then
            echo "Found $(wc -l < /tmp/release-body.md) lines; overriding release notes"
            gh release edit "$VERSION" --notes-file /tmp/release-body.md
          else
            echo "No entry for $VERSION_NO_V in CHANGELOG.md; keeping goreleaser auto-changelog"
          fi

  # -------------------------------------------------------------
  # 2. Rust sidecar — rampart-native cross-compile
  # -------------------------------------------------------------
  native:
    name: rampart-native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl tools (linux targets)
        if: contains(matrix.target, 'linux-musl')
        # aarch64-musl needs a cross-linker: the runner's default
        # /usr/bin/ld is x86_64 GNU ld and chokes on aarch64 object
        # files with "Relocations in generic ELF (EM: 183)".
        # gcc-aarch64-linux-gnu gives us aarch64-linux-gnu-gcc as the
        # cargo linker (paired with the env vars on the build step).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          fi

      - name: Build rampart-native
        working-directory: native
        env:
          # Harmless no-ops for non-aarch64-musl targets — cargo only
          # consults the matching CARGO_TARGET_* prefix.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} --bin rampart-native

      - name: Install cosign + syft
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Package + sign binary
        working-directory: native
        run: |
          BIN=target/${{ matrix.target }}/release/rampart-native
          TARBALL="rampart-native_${{ github.ref_name }}_${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C target/${{ matrix.target }}/release rampart-native
          # macOS runners ship `shasum -a 256` (Perl) and Linux
          # runners ship `sha256sum` (coreutils). Both emit the
          # canonical "<hash>  <file>" format that `-c` understands.
          if command -v sha256sum >/dev/null; then
            sha256sum "$TARBALL" > "${TARBALL}.sha256"
          else
            shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          fi
          # SBOM per archive.
          syft "$BIN" -o spdx-json > "${TARBALL}.sbom.spdx.json"
          # Keyless signature via OIDC.
          cosign sign-blob --yes \
            --output-signature "${TARBALL}.sig" \
            --output-certificate "${TARBALL}.pem" \
            "$TARBALL"

      - name: Upload release asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            native/rampart-native_*.tar.gz
            native/rampart-native_*.tar.gz.sha256
            native/rampart-native_*.tar.gz.sbom.spdx.json
            native/rampart-native_*.tar.gz.sig
            native/rampart-native_*.tar.gz.pem
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

      - name: Upload linux binary for image-native
        # Raw linux binaries feed the `image-native` job's multi-arch
        # docker buildx. Darwin targets are release-only and never
        # enter a container, so the upload is gated on the musl
        # targets.
        if: contains(matrix.target, 'linux-musl')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rampart-native-${{ matrix.target }}
          path: native/target/${{ matrix.target }}/release/rampart-native
          retention-days: 1
          if-no-files-found: error

  # -------------------------------------------------------------
  # 3. Container images (multi-arch) — engine, slack-notifier,
  #    mock-npm-registry, backstage. rampart-native is built
  #    separately (see `image-native:` below) because it COPYs a
  #    pre-built binary from the native matrix instead of compiling
  #    inside the image.
  # -------------------------------------------------------------
  images:
    name: image / ${{ matrix.image }}
    runs-on: ubuntu-24.04
    needs: [goreleaser]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: engine
            context: ./engine
            dockerfile: ./engine/Dockerfile
          - image: rampart-slack-notifier
            context: ./integrations/slack-notifier
            dockerfile: ./integrations/slack-notifier/Dockerfile
          - image: rampart-mock-npm-registry
            context: ./integrations/mock-npm-registry
            dockerfile: ./integrations/mock-npm-registry/Dockerfile
          - image: rampart-backstage
            context: .
            dockerfile: ./backstage/examples/app/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/ugurcan-aytar/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGES: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $IMAGES; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate + attest SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/ugurcan-aytar/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM attestation (cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            "ghcr.io/ugurcan-aytar/${{ matrix.image }}@${DIGEST}"

  # -------------------------------------------------------------
  # 4. rampart-native container image — COPY the linux binaries
  #    produced by the `native:` matrix instead of re-compiling
  #    under QEMU. Keeps the image shipment to "the bytes we already
  #    signed + SBOM'd" and skips the 10-minute QEMU cross-compile.
  # -------------------------------------------------------------
  image-native:
    name: image / rampart-native
    runs-on: ubuntu-24.04
    needs: [native]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rampart-native-x86_64-unknown-linux-musl
          path: /tmp/rampart-native/amd64

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rampart-native-aarch64-unknown-linux-musl
          path: /tmp/rampart-native/arm64

      - name: Stage binaries into build context
        # Dockerfile COPYs artifacts/rampart-native-${TARGETARCH}
        # where TARGETARCH is Docker's automatic build-arg (amd64
        # or arm64) — the file name suffixes have to match.
        run: |
          mkdir -p native/artifacts
          cp /tmp/rampart-native/amd64/rampart-native native/artifacts/rampart-native-amd64
          cp /tmp/rampart-native/arm64/rampart-native native/artifacts/rampart-native-arm64
          chmod +x native/artifacts/rampart-native-*
          ls -l native/artifacts/

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/ugurcan-aytar/rampart-native
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./native
          file: ./native/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGES: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $IMAGES; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate + attest SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/ugurcan-aytar/rampart-native@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM attestation (cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            "ghcr.io/ugurcan-aytar/rampart-native@${DIGEST}"
