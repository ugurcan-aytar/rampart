# Rampart demo stack.
# Default profile (`docker compose up`):
#   engine              — Go core, HTTP + SSE API on :8080
#   mock-npm-registry   — demo-only canned lockfile + IoC feed on :8081
#   slack-notifier      — SSE consumer; default SLACK_WEBHOOK_URL="" =>
#                         dry-run mode (logs payloads instead of POSTing)
#
# Opt-in `--profile native` adds:
#   rampart-native      — Rust lockfile parser over UDS (ADR-0005 opt-in).
#
# Not containerised in Phase 1 (run locally with `yarn workspace rampart dev`):
#   backstage IncidentDashboard — plugin dev harness renders against
#     the engine's `/v1/stream` over the host's exposed :8080; the
#     Playwright e2e spec drives headless Chrome against localhost:3000.
#     Full Backstage container deferred to a later step (yarn + webpack
#     containerisation is its own scope).
#
# Not wired in Phase 1 (engine uses in-memory storage):
#   postgres — Phase 2 storage backend. Compose entry lands when the
#     engine gains a real DB repo.
#
# Usage:
#   docker compose up -d                       # go parser, no sidecar
#   RAMPART_PARSER_STRATEGY=native \
#     docker compose --profile native up -d    # rust sidecar, ADR-0005

services:
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    image: rampart-engine:dev
    environment:
      RAMPART_PARSER_STRATEGY: ${RAMPART_PARSER_STRATEGY:-go}
      RAMPART_NATIVE_SOCKET: /var/run/rampart/native.sock
    volumes:
      - native-sock:/var/run/rampart
    ports:
      - "8080:8080"
    # No healthcheck: distroless-static has no shell, so CMD-SHELL
    # probes can't run inside. Scenario scripts wait-for /healthz from
    # the host side instead.

  mock-npm-registry:
    build:
      context: ./integrations/mock-npm-registry
      dockerfile: Dockerfile
    image: rampart-mock-npm-registry:dev
    ports:
      - "8081:8081"
    # Same distroless-no-shell constraint as engine — probed from host.

  slack-notifier:
    build:
      context: ./integrations/slack-notifier
      dockerfile: Dockerfile
    image: rampart-slack-notifier:dev
    environment:
      # Empty webhook = dry-run: the binary logs a single indented
      # JSON block per incident.opened instead of POSTing to Slack.
      # Set SLACK_WEBHOOK_URL on the host shell (or via .env) to
      # exercise the real webhook path.
      RAMPART_ENGINE_URL: http://engine:8080
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      - engine

  rampart-native:
    build:
      context: ./native
      dockerfile: Dockerfile
    image: rampart-native:dev
    profiles: ["native", "full"]
    environment:
      RAMPART_NATIVE_SOCKET: /var/run/rampart/native.sock
      RUST_LOG: info
    volumes:
      - native-sock:/var/run/rampart

volumes:
  # Shared tmpfs-style volume carrying only the UDS socket. Engine +
  # native bind-mount it read-write when both are running; when the
  # native profile is disabled, the volume is still created but empty.
  native-sock:
