# Rampart demo stack.
# Default profile (`docker compose up`):
#   engine              — Go core, HTTP + SSE API on :8080
#   mock-npm-registry   — demo-only canned lockfile + IoC feed on :8081
#   slack-notifier      — SSE consumer; default SLACK_WEBHOOK_URL="" =>
#                         dry-run (logs payloads instead of POSTing)
#   backstage           — production Backstage build with the rampart
#                         frontend + backend plugins. Port 3000 on the
#                         host maps to :7007 inside the container
#                         (Backstage's canonical backend port).
#
# Opt-in `--profile native` adds:
#   rampart-native      — Rust lockfile parser over UDS (ADR-0005 opt-in).
#
# Not wired in Phase 1 (engine uses in-memory storage):
#   postgres — Phase 2 storage backend; compose entry lands when
#     the engine gains a real DB repo.
#
# Usage:
#   docker compose up -d                       # go parser, no sidecar
#   RAMPART_PARSER_STRATEGY=native \
#     docker compose --profile native up -d    # rust sidecar, ADR-0005

services:
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    image: rampart-engine:dev
    environment:
      RAMPART_PARSER_STRATEGY: ${RAMPART_PARSER_STRATEGY:-go}
      RAMPART_NATIVE_SOCKET: /var/run/rampart/native.sock
    volumes:
      - native-sock:/var/run/rampart
    ports:
      - "8080:8080"
    # No healthcheck: distroless-static has no shell, so CMD-SHELL
    # probes can't run inside. Scenario scripts wait-for /healthz from
    # the host side instead.

  mock-npm-registry:
    build:
      context: ./integrations/mock-npm-registry
      dockerfile: Dockerfile
    image: rampart-mock-npm-registry:dev
    ports:
      - "8081:8081"

  slack-notifier:
    build:
      context: ./integrations/slack-notifier
      dockerfile: Dockerfile
    image: rampart-slack-notifier:dev
    environment:
      # Empty webhook = dry-run: the binary logs a single indented
      # JSON block per incident.opened instead of POSTing to Slack.
      # Set SLACK_WEBHOOK_URL on the host shell (or via .env) to
      # exercise the real webhook path.
      RAMPART_ENGINE_URL: http://engine:8080
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      - engine

  backstage:
    build:
      # Repo root context so the Dockerfile can resolve Yarn workspaces
      # (plugins/* + examples/app/packages/*). Minimal context thanks to
      # the root .dockerignore.
      context: .
      dockerfile: backstage/examples/app/Dockerfile
    image: rampart-backstage:dev
    ports:
      - "3000:7007"
    environment:
      # app.baseUrl + backend.baseUrl need to match the browser's view
      # of the server (host mapping), not the internal container port.
      APP_CONFIG_app_baseUrl: http://localhost:3000
      APP_CONFIG_backend_baseUrl: http://localhost:3000
      # Browser-side baseUrl — the rampart frontend's RampartClient
      # reads this from configApi at runtime and hits it directly.
      # Must be reachable from the browser (host), not compose-internal
      # DNS (`engine`). The rampart-backend proxy plugin DOES mount
      # /api/rampart/v1/* server-side; a Phase 2 refactor of
      # RampartClient can route through that path and let us use the
      # compose DNS here. Engine's wildcard CORS middleware covers the
      # direct-fetch path for now.
      APP_CONFIG_rampart_baseUrl: http://localhost:8080
      NODE_ENV: production
    depends_on:
      - engine
    # Backstage ships with `node` available in the runtime image so
    # we can use a node-one-liner healthcheck; /healthcheck is served
    # by the backend-defaults health plugin.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7007/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s

  rampart-native:
    build:
      context: ./native
      dockerfile: Dockerfile
    image: rampart-native:dev
    profiles: ["native", "full"]
    environment:
      RAMPART_NATIVE_SOCKET: /var/run/rampart/native.sock
      RUST_LOG: info
    volumes:
      - native-sock:/var/run/rampart

volumes:
  # Shared tmpfs-style volume carrying only the UDS socket. Engine +
  # native bind-mount it read-write when both are running; when the
  # native profile is disabled, the volume is still created but empty.
  native-sock:
