# Full demo stack for rampart.
# Services come online as each module is scaffolded:
#   engine           (Adım 2-3) — Go core, HTTP + SSE API
#   rampart-native   (Adım 6)   — Rust lockfile parser, UDS shared volume
#   postgres         (Adım 7)   — persistent storage backend
#   mock-npm-registry (Adım 7)  — pre-seeded with malicious package fixtures
#   backstage        (Adım 7)   — examples/app with plugins loaded
#   slack-notifier   (Adım 7)   — webhook listener subscribed to /v1/stream

services:
  rampart-native:
    build:
      context: ./native
      dockerfile: Dockerfile
    image: rampart-native:dev
    profiles: ["native", "full"]
    environment:
      RAMPART_NATIVE_SOCKET: /var/run/rampart/native.sock
      RUST_LOG: info
    volumes:
      - native-sock:/var/run/rampart
    # No healthcheck: the distroless base has no shell, so Docker's
    # CMD-SHELL probes can't run inside the container. A proper readiness
    # check will ship in Adım 7 as either a tiny statically-linked prober
    # binary co-installed in the image, or an out-of-container probe that
    # runs `socat UNIX-CONNECT:…native.sock` from the engine side. For
    # Phase 1 we rely on the sidecar's sub-100 ms startup and compose
    # ordering.

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    image: rampart-engine:dev
    profiles: ["native", "full"]
    environment:
      RAMPART_NATIVE_SOCKET: /var/run/rampart/native.sock
    volumes:
      - native-sock:/var/run/rampart
    ports:
      - "8080:8080"
    depends_on:
      rampart-native:
        condition: service_started

volumes:
  # Shared tmpfs-style volume carrying only the UDS socket. Engine +
  # native bind-mount it read-write; anything else in the stack is
  # isolated from it.
  native-sock:
